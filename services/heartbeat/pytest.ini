[pytest]
# HeartBeat Service Test Configuration
asyncio_mode = auto

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    load: marks tests as load tests

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Timeout (prevent hanging tests)
timeout = 60

# Coverage configuration
[coverage:run]
source = src
branch = True
omit =
    */tests/*
    */__pycache__/*
    */conftest.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

show_missing = True
precision = 2
fail_under = 90

[coverage:html]
directory = htmlcov
title = HeartBeat Service Test Coverage
