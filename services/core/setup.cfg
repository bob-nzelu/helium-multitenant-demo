[coverage:run]
source = src
branch = True
omit =
    */tests/*
    */__pycache__/*
    */conftest.py
    */database/repositories/*
    */_archive/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:

show_missing = True
precision = 2

[coverage:html]
directory = htmlcov
title = Core Service Test Coverage
