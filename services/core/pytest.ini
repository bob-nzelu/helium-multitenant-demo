[pytest]
# Core Service Test Configuration
asyncio_mode = strict

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests

# Output
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Timeout (prevent hanging tests)
timeout = 60

# Coverage configuration lives in setup.cfg (coverage.py reads [coverage:*] from there)
