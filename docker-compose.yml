# Helium Multi-Tenant Infrastructure — Full Stack
# 8 services: postgres, redis, heartbeat, relay-api, core, edge, his, simulator

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-helium}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-helium_demo_2026}
      POSTGRES_DB: ${PG_DATABASE:-helium}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./config/schemas/001_all_tables.sql:/docker-entrypoint-initdb.d/001_all_tables.sql:ro
      - ./config/schemas/002_auth_schema.sql:/docker-entrypoint-initdb.d/002_auth_schema.sql:ro
      - ./config/schemas/003_seed_abbey_user.sql:/docker-entrypoint-initdb.d/003_seed_abbey_user.sql:ro
      - ./config/schemas/004_devices.sql:/docker-entrypoint-initdb.d/004_devices.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-helium}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── RabbitMQ (Message Broker — core_queue + edge_queue + DLQs) ────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-helium}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-helium_mq_2026}
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./config/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./config/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── HeartBeat ──────────────────────────────────────────────────────
  heartbeat:
    build:
      context: ./services/heartbeat
    ports:
      - "9000:9000"
    environment:
      - HEARTBEAT_MODE=primary
      - HEARTBEAT_HOST=0.0.0.0
      - HEARTBEAT_PORT=9000
      - HEARTBEAT_BLOB_STORAGE_ROOT=/app/data/blobs
      - HEARTBEAT_DEFAULT_DAILY_LIMIT=1000
      - HEARTBEAT_AUTH_ENABLED=true
      - HEARTBEAT_MOCK_AUTH=false
      - HEARTBEAT_AUTO_MIGRATE=true
      - HEARTBEAT_TIER=test
      - HEARTBEAT_MAX_CONCURRENT_SESSIONS=3
      - HEARTBEAT_TEST_HARNESS_ENABLED=true
      - HEARTBEAT_TEST_HARNESS_KEY_HASH=786ac05ff1f90d133056376fa0a65188cab837fe4450d47d1be924bd54d017d3
      - HEARTBEAT_PG_HOST=postgres
      - HEARTBEAT_PG_PORT=5432
      - HEARTBEAT_PG_USER=${PG_USER:-helium}
      - HEARTBEAT_PG_PASSWORD=${PG_PASSWORD:-helium_demo_2026}
      - HEARTBEAT_PG_DATABASE=${PG_DATABASE:-helium}
    volumes:
      - heartbeat-data:/app/databases
      - heartbeat-blobs:/app/data/blobs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:9000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Relay API ──────────────────────────────────────────────────────
  relay-api:
    build:
      context: ./services/relay
    ports:
      - "8082:8082"
    environment:
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=8082
      - RELAY_INSTANCE_ID=relay-helium-1
      - RELAY_REQUIRE_ENCRYPTION=false
      - RELAY_HEARTBEAT_API_URL=http://heartbeat:9000
      - RELAY_CORE_API_URL=http://core:8080
      - RELAY_TENANTS_FILE=/app/tenants.json
      - RELAY_DATABASE_URL=postgresql://${PG_USER:-helium}:${PG_PASSWORD:-helium_demo_2026}@postgres:5432/${PG_DATABASE:-helium}
      - RELAY_REDIS_URL=redis://redis:6379/0
      - RELAY_RATE_LIMIT_DAILY=${RELAY_RATE_LIMIT_DAILY:-500}
      - RELAY_MAX_FILES=3
      - RELAY_MAX_FILE_SIZE_MB=10.0
      - RELAY_WORKERS=1
      - RELAY_MALWARE_SCAN_ENABLED=false
    volumes:
      - ./config/tenants.json:/app/tenants.json:ro
    depends_on:
      heartbeat:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8082/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Core (Canonical) ───────────────────────────────────────────────
  core:
    build:
      context: ./services/core
    ports:
      - "8080:8080"
    environment:
      - CORE_DB_HOST=postgres
      - CORE_DB_PORT=5432
      - CORE_DB_USER=${PG_USER:-helium}
      - CORE_DB_PASSWORD=${PG_PASSWORD:-helium_demo_2026}
      - CORE_DB_NAME=${PG_DATABASE:-helium}
      - CORE_DB_POOL_MIN=2
      - CORE_DB_POOL_MAX=10
      - CORE_HOST=0.0.0.0
      - CORE_PORT=8080
      - CORE_HEARTBEAT_URL=http://heartbeat:9000
      - CORE_EDGE_URL=http://edge:8085
      - CORE_HIS_BASE_URL=http://his:8500
      - CORE_HIS_FEEDBACK_ENABLED=false
      - CORE_LOG_LEVEL=INFO
      - CORE_CORS_ORIGINS=*
      - CORE_RABBITMQ_URL=amqp://${RABBITMQ_USER:-helium}:${RABBITMQ_PASSWORD:-helium_mq_2026}@rabbitmq:5672/
      - CORE_CORE_QUEUE=core_queue
      - CORE_EDGE_QUEUE=edge_queue
    depends_on:
      postgres:
        condition: service_healthy
      heartbeat:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Edge (Stub) ────────────────────────────────────────────────────
  edge:
    build:
      context: ./services/edge
    ports:
      - "8085:8085"
    environment:
      - EDGE_RABBITMQ_URL=amqp://${RABBITMQ_USER:-helium}:${RABBITMQ_PASSWORD:-helium_mq_2026}@rabbitmq:5672/
      - EDGE_QUEUE=edge_queue
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── HIS (Stub) ─────────────────────────────────────────────────────
  his:
    build:
      context: ./services/his
    ports:
      - "8500:8500"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8500/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── SIS (Stub) ──────────────────────────────────────────────────────
  sis:
    build:
      context: ./services/sis
    ports:
      - "8501:8501"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ── Simulator ──────────────────────────────────────────────────────
  simulator:
    build:
      context: ./services/simulator
    ports:
      - "8090:8090"
    environment:
      - SIMULATOR_RELAY_URL=http://relay-api:8082
      - SIMULATOR_CORE_URL=http://core:8080
      - SIMULATOR_PORT=8090
      - SIMULATOR_DATA_DIR=/app/data
      - SIMULATOR_CONFIG_DIR=/app/config
    volumes:
      - ./data:/app/data:ro
      - ./config:/app/config:ro
    depends_on:
      relay-api:
        condition: service_healthy
      core:
        condition: service_healthy

volumes:
  pg-data:
  heartbeat-data:
  heartbeat-blobs:
  rabbitmq-data:
