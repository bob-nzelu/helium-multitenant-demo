## Helium RabbitMQ Configuration
## Load pre-defined queues/exchanges from definitions.json

management.load_definitions = /etc/rabbitmq/definitions.json

## Consumer timeout (5 minutes — long processing pipelines)
consumer_timeout = 300000

## Memory high watermark (relative to container limit)
vm_memory_high_watermark.relative = 0.7

## Disk free limit
disk_free_limit.absolute = 200MB
